<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game by Dang</title>
    <link rel="stylesheet" href="./css/index.css" />
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <!-- ================== -->
      <!-- Start -->
      <!-- ================== -->

      <div class="screen start-screen">
        <h1 class="start-screen-title">QUIZ TIME!</h1>
        <p class="start-screen-p">
          Test your knowledge with these fun question
        </p>
        <button class="start-screen-btn">Start Quiz</button>
      </div>
      <!-- ================== -->
      <!-- Quiz container -->
      <!-- ================== -->
      <div class="screen quiz-container">
        <h3 class="quiz-container-title">Question title here!</h3>
        <div class="quiz-container-info">
          <p>Question <span class="current-question">1</span> of 5</p>
          <p>Score: <span class="score">0</span></p>
        </div>
        <!--  -->
        <div class="answer-container"></div>
        <!--  -->
        <div class="progress">
          <div class="progress-fill"></div>
        </div>
      </div>
      <!-- ================== -->
      <!-- Quiz Results -->
      <!-- ================== -->
      <div class="screen quiz-results">
        <h1 class="quiz-result-title">Quiz Results</h1>
        <div class="quiz-result-end">
          <p>Your score <span class="score">0</span> out of 5</p>
          <p>Good job !</p>
        </div>
        <div class="quiz-result-btn"><button>Restart Quiz</button></div>
      </div>
    </div>
  </body>
</html>
