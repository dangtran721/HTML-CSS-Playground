<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning project: CV Portfolio</title>
    <link rel="icon" href="./asset/icons/10403597.png" />

    <!-- Import icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/devicon/2.17.0/devicon.min.css"
      integrity="sha512-6/05LVs+grXBAu5XzdiMFB64yCVF9FL70zWrTKcaTEKygrO7fC5LqfL/SKPpuRpimL2aE0D7Hw/NoED+7+7/VQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="resume-container">
      <header class="header">
        <!-- bubble left -->
        <div class="bubble-left">
          <div class="hello-text">Hello There</div>
          <div class="contact-info">
            <p>
              <i class="fas fa-mobile-alt"></i>
              <a href="tel:0123456789">0123456789</a>
            </p>

            <p>
              <i class="fas fa-map-marker-alt"></i>
              <a
                href="https://maps.app.goo.gl/7n32k9jYMfePWRgFA"
                target="_blank"
                rel="noopener noreferrer"
                >Ho Chi Minh, Viet Nam</a
              >
            </p>

            <p>
              <i class="fa fa-globe"></i>
              <a href="https://www.linkedin.com/in/tranminhdang/"
                >https://www.linkedin.com/in/tranminhdang/</a
              >
            </p>

            <p>
              <i class="fa fa-envelope"></i>
              <a href="mailto:tranminhdang0702@gmail.com"
                >tranminhdang0702@gmail.com/</a
              >
            </p>
          </div>
        </div>

        <!-- Avatar -->
        <div class="avatar">
          <img src="./asset/images/author_image.jpg" alt="TranMinhDang" />
        </div>

        <!-- bubble right -->
        <div class="bubble-right">
          <div class="im-text">I'm Tran Minh Dang</div>
          <div class="first-job">Developer</div>
          <div class="second-job">Student</div>
          <div class="third-job">Software Engineer</div>
        </div>
      </header>

      <main class="main-content">
        <div class="col-left">
          <!-- About Me -->
          <session class="session-left">
            <div class="ribbon-left bg-green">
              <i class="fas fa-user"></i>About Me
            </div>
          </session>

          <!-- Personal Info -->
          <session class="session-left">
            <div class="ribbon-left bg-dark-teal">
              <i class="fas fa-id-card"></i>Personal Info
            </div>
          </session>

          <!-- Education -->
          <session class="session-left">
            <div class="ribbon-left bg-orange">
              <i class="fas fa-graduation-cap"></i> Education
            </div>
          </session>

          <!-- Interests -->
          <session class="session-left">
            <div class="ribbon-left bg-red">
              <i class="fas fa-thumbs-up"></i>Interests
            </div>
          </session>
        </div>
        <div class="col-right"></div>
      </main>

      <!-- <footer class="footer"></footer> -->
    </div>
  </body>
</html>
