<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drag-Drop Todo list</title>
    <link rel="stylesheet" href="./css/index.css" />
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Todo List</h1>
      <div class="board">
        <div class="list">
          <h2>Todo</h2>
          <div class="card" draggable="true">Wash dishes</div>
        </div>
        <div class="list">
          <h2>In Progress</h2>
          <div class="card" draggable="true">Complete project</div>
        </div>
        <div class="list">
          <h2>Done</h2>
          <div class="card" draggable="true">Workout</div>
        </div>
      </div>
    </div>
  </body>
</html>
